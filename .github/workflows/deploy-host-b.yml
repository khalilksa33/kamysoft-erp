name: Build and Deploy KamySoft POS & ERP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/khalilksa33/kamysoft-erp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cloudflare Tunnel Client (cloudflared)
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Set up SSH configuration for Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          cat << 'EOF' > ~/.ssh/id_rsa
          ${{ secrets.SSH_PRIVATE_KEY_HOST_B }}
          EOF
          chmod 600 ~/.ssh/id_rsa
          
          # Base SSH configuration
          cat <<EOF > ~/.ssh/config
          Host ssh-erp.26i.uk
              HostName ssh-erp.26i.uk
              User iicc2
              IdentityFile ~/.ssh/id_rsa
              StrictHostKeyChecking no
          EOF
          
          # Inject Cloudflare Access Service Token headers if they are provided as secrets
          if [ -n "${{ secrets.CF_CLIENT_ID_HOST_B }}" ] && [ -n "${{ secrets.CF_CLIENT_SECRET_HOST_B }}" ]; then
            echo "    ProxyCommand cloudflared access ssh --hostname %h --service-token-id ${{ secrets.CF_CLIENT_ID_HOST_B }} --service-token-secret ${{ secrets.CF_CLIENT_SECRET_HOST_B }}" >> ~/.ssh/config
          else
            echo "    ProxyCommand cloudflared access ssh --hostname %h" >> ~/.ssh/config
          fi

      - name: Transfer Kubernetes Manifests to Host B
        run: |
          ssh iicc2@ssh-erp.26i.uk "rm -rf ~/kamysoft-erp/k8s && mkdir -p ~/kamysoft-erp/k8s"
          scp -r k8s/* iicc2@ssh-erp.26i.uk:~/kamysoft-erp/k8s/

      - name: Deploy via Host B k3s Cluster
        run: |
          ssh iicc2@ssh-erp.26i.uk "export KUBECONFIG=/etc/rancher/k3s/k3s.yaml && \
          sudo /usr/local/bin/k3s kubectl create secret generic cloudflare-secrets \
            --from-literal=CF_API_TOKEN='${{ secrets.CF_API_TOKEN }}' \
            --from-literal=CF_ACCOUNT_ID='${{ secrets.CF_ACCOUNT_ID }}' \
            --from-literal=CF_TUNNEL_ID='${{ secrets.CF_TUNNEL_ID }}' \
            --dry-run=client -o yaml | sudo /usr/local/bin/k3s kubectl apply -f - && \
          sudo /usr/local/bin/k3s kubectl apply -f ~/kamysoft-erp/k8s/ && \
          sudo /usr/local/bin/k3s kubectl rollout restart deployment/kamysoft-erp"

