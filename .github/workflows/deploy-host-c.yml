name: Deploy to Host C

on:
  push:
    branches:
      - main

jobs:
  deploy-host-c:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/khalilksa33/kamysoft-erp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cloudflare Tunnel Client (cloudflared)
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Set up SSH configuration for Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          cat << 'EOF' > ~/.ssh/id_rsa
          ${{ secrets.SSH_PRIVATE_KEY_HOST_C }}
          EOF
          chmod 600 ~/.ssh/id_rsa
          
          # Base SSH configuration
          cat <<EOF > ~/.ssh/config
          Host ssh-cloud.26i.uk
              HostName ssh-cloud.26i.uk
              User cloud
              IdentityFile ~/.ssh/id_rsa
              StrictHostKeyChecking no
          EOF
          
          # Inject Cloudflare Access Service Token headers
          echo "    ProxyCommand cloudflared access ssh --hostname %h --service-token-id ${{ secrets.CF_CLIENT_ID_HOST_C }} --service-token-secret ${{ secrets.CF_CLIENT_SECRET_HOST_C }}" >> ~/.ssh/config

      - name: Transfer Kubernetes Manifests to Host C
        run: |
          ssh -v cloud@ssh-cloud.26i.uk "rm -rf ~/kamysoft-erp/k8s && mkdir -p ~/kamysoft-erp/k8s"
          scp -v -r k8s/* ssh-cloud.26i.uk:~/kamysoft-erp/k8s/

      - name: Deploy via Host C k8s Cluster
        run: |
          ssh -v cloud@ssh-cloud.26i.uk "echo '*/*cloud*/*' | sudo -S kubectl create secret generic cloudflare-secrets \
            --from-literal=CF_API_TOKEN='${{ secrets.CF_API_TOKEN }}' \
            --from-literal=CF_ACCOUNT_ID='${{ secrets.CF_ACCOUNT_ID }}' \
            --from-literal=CF_TUNNEL_ID='${{ secrets.CF_TUNNEL_ID }}' \
            --dry-run=client -o yaml | echo '*/*cloud*/*' | sudo -S kubectl apply -f - && \
          echo '*/*cloud*/*' | sudo -S kubectl apply -f ~/kamysoft-erp/k8s/ && \
          echo '*/*cloud*/*' | sudo -S kubectl rollout restart deployment/kamysoft-erp"



