name: Build and Deploy KamySoft POS & ERP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Container on Host B
        run: |
          # Clean up old manual containers if they exist
          docker stop kamysoft-erp || true
          docker rm kamysoft-erp || true
          
          # Deploy database and backend app using docker compose
          docker compose down || true
          docker compose up -d --build
          echo "Deployment completed successfully. Access via Cloudflare Tunnel at erp.26i.uk"
