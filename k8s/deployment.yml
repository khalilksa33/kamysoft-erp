apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-deployment
  labels:
    app: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:latest
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: mongodb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  selector:
    app: mongodb
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kamysoft-erp-deployment
  labels:
    app: kamysoft-erp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kamysoft-erp
  template:
    metadata:
      labels:
        app: kamysoft-erp
    spec:
      containers:
        - name: kamysoft-erp
          # This should be replaced with your actual image path
          # For example: ghcr.io/khalilksa33/kamysoft-erp:latest
          image: kamysoft-erp:latest
          ports:
            - containerPort: 8089
          env:
            - name: PORT
              value: "8089"
            - name: MONGO_URI
              value: "mongodb://db:27017/kamysoft-erp"
            - name: JWT_SECRET
              value: "kamysoft_super_secret_key_2026"
---
apiVersion: v1
kind: Service
metadata:
  name: kamysoft-erp-service
spec:
  type: LoadBalancer
  selector:
    app: kamysoft-erp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8089
