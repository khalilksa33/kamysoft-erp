apiVersion: v1
kind: ConfigMap
metadata:
  name: kamysoft-erp-config
  labels:
    app: kamysoft-erp
data:
  PORT: "8089"
  MONGO_URI: "mongodb://mongodb:27017/kamysoft-erp"
---
apiVersion: v1
kind: Secret
metadata:
  name: kamysoft-erp-secrets
  labels:
    app: kamysoft-erp
type: Opaque
data:
  # Base64 encoded values. Replace these with your own secrets:
  # JWT_SECRET: base64 of 'kamysoft_super_secret_key_2026'
  # SAAS_ADMIN_KEY: base64 of 'kamysoft-saas-admin-2026'
  JWT_SECRET: a2FteXNvZnRfc3VwZXJfc2VjcmV0X2tleV8yMDI2
  SAAS_ADMIN_KEY: a2FteXNvZnQtc2Fhcy1hZG1pbi0yMDI2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kamysoft-erp
  labels:
    app: kamysoft-erp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kamysoft-erp
  template:
    metadata:
      labels:
        app: kamysoft-erp
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: kamysoft-erp
          image: ghcr.io/khalilksa33/kamysoft-erp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8089
              name: http
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: kamysoft-erp-config
                  key: PORT
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: kamysoft-erp-config
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kamysoft-erp-secrets
                  key: JWT_SECRET
            - name: SAAS_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: kamysoft-erp-secrets
                  key: SAAS_ADMIN_KEY
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-secrets
                  key: CF_API_TOKEN
                  optional: true
            - name: CF_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: cloudflare-secrets
                  key: CF_ACCOUNT_ID
                  optional: true
            - name: CF_TUNNEL_ID
              valueFrom:
                secretKeyRef:
                  name: cloudflare-secrets
                  key: CF_TUNNEL_ID
                  optional: true
          resources:
            limits:
              cpu: "500m"
              memory: 512Mi
            requests:
              cpu: "100m"
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kamysoft-erp
  labels:
    app: kamysoft-erp
spec:
  ports:
    - port: 8089
      targetPort: 8089
      nodePort: 30184
      protocol: TCP
      name: http
  selector:
    app: kamysoft-erp
  type: NodePort
