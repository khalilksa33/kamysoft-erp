apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kamysoft-erp-ingress
  annotations:
    # Use Traefik, which comes pre-installed with k3s
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    # Route the main domain to the app
    - host: 26i.uk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kamysoft-erp-service
                port:
                  number: 80
    # Route all subdomains (tenants, marketing, demo, etc.) to the app
    - host: "*.26i.uk"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kamysoft-erp-service
                port:
                  number: 80
