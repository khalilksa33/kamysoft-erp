<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SME Solutions</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <!-- QR Code Script -->
    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>
    <style>
        /* Embed basic resets for loading states */
        body {
            margin: 0;
            background-color: #0b0f19;
            font-family: 'Cairo', 'Outfit', sans-serif;
            color: #ffffff;
        }
    </style>
<script>
window.addEventListener("error", e => fetch("http://localhost:9999/log", {method: "POST", body: e.error ? e.error.stack : e.message}));
window.addEventListener("unhandledrejection", e => fetch("http://localhost:9999/log", {method: "POST", body: e.reason ? e.reason.stack : e.reason}));
const origErr = console.error;
console.error = (...args) => {
    fetch("http://localhost:9999/log", {method: "POST", body: args.join(" ")});
    origErr(...args);
};
</script></head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
